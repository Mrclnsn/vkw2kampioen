<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live — VKW 2 vs HOVC 2</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #001E79; color: white; min-height: 100vh; }

    .logo-bar { width: 100%; background: #001158; padding: 12px 24px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .logo-text { font-size: 14px; font-weight: 700; color: #8FA8FF; letter-spacing: 3px; text-transform: uppercase; }

    .main { max-width: 560px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* STATUS */
    .status-wrap { text-align: center; margin-bottom: 1.5rem; }
    .status-badge { display: inline-block; padding: 5px 18px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .status-verwacht  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .status-bezig     { background: #22c55e; color: white; animation: pulse 2s infinite; }
    .status-rust      { background: #f59e0b; color: white; }
    .status-afgelopen { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

    /* SCOREBORD */
    .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 0.4rem; }
    .team { font-size: clamp(13px, 3.5vw, 19px); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    .team.home { text-align: right; }
    .team.away { text-align: left; color: rgba(255,255,255,0.5); }
    .score-box { font-family: 'Anton', sans-serif; font-size: clamp(52px, 13vw, 84px); line-height: 1; text-align: center; white-space: nowrap; letter-spacing: -2px; }
    .score-dash { color: rgba(255,255,255,0.2); }
    .match-meta { text-align: center; font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 2rem; }

    /* KOLOMHOOFDEN */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 0.5rem;
      padding: 0 4px;
    }
    .col-headers span {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
    }
    .col-headers span:first-child { text-align: left; }
    .col-headers span:last-child  { text-align: right; }

    /* DIVIDER */
    .tl-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 0;
    }

    /* EVENTS — één rij, links of rechts */
    .event {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 44px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .event:last-child { border-bottom: none; }

    /* De ingevulde kant */
    .ev-thuis {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 8px 4px;
    }
    .ev-uit {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 4px 8px 12px;
    }

    .ev-icon { font-size: 16px; flex-shrink: 0; }

    .ev-info { display: flex; flex-direction: column; }
    .ev-info.right { align-items: flex-end; text-align: right; }

    .ev-min  { font-family: 'Anton', sans-serif; font-size: 11px; color: #8FA8FF; }
    .ev-naam { font-size: 14px; font-weight: 700; color: white; line-height: 1.2; }
    .ev-sub  { font-size: 11px; color: rgba(255,255,255,0.4); }

    /* Doelpunt highlight */
    .event.goal { background: rgba(255,215,0,0.05); }
    .event.goal .ev-min { color: #FFD700; }

    /* Lege staat */
    .no-events {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      font-style: italic;
      padding: 1.5rem 0;
    }

    /* NAV */
    .back-row { display: flex; justify-content: center; gap: 16px; margin-top: 2.5rem; flex-wrap: wrap; }
    .back-link { color: #8FA8FF; font-size: 13px; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
    .back-link:hover { color: white; }
    .refresh-info { text-align: center; font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 1.25rem; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="logo-bar">
    <img src="logo.svg" style="width:38px;height:38px;" />
    <div class="logo-text">VKW Voetbal</div>
  </div>

  <div class="main">

    <!--
    ════════════════════════════════════════════════
    ✏️  BEWERK HIERONDER OM DE WEDSTRIJD BIJ TE HOUDEN
    ════════════════════════════════════════════════
    -->

    <!-- ✏️  STATUS — verander de class:
         status-verwacht / status-bezig / status-rust / status-afgelopen -->
    <div class="status-wrap">
      <div class="status-badge status-afgelopen">Afgelopen</div>
    </div>

    <!-- ✏️  SCORE — pas de twee cijfers aan -->
    <div class="scoreboard">

    <div class="col-headers">

    <hr class="tl-divider" />

      🔄 wissel
    Voeg class="goal" toe aan <div class="event"> bij een doelpunt.
    ════════════════════════════════════════════════
    -->

       <div class="event [goal]">

    </div>
    
       <div class="event [goal]">
      <div class="ev-thuis">
        <span class="ev-icon">⚽</span>
        <div class="ev-info">
          <span class="ev-min">42'</span>
          <span class="ev-naam">Anjo Willems</span>
        </div>

      <div></div>
    </div>
    
       <div class="event [goal]">
      <div class="ev-thuis">
        <span class="ev-icon">⚽</span>

          <span class="ev-min">85'</span>
          <span class="ev-naam">Wieger Eefting</span>
        </div>
      </div>
      <div></div>
    </div>
    
    
    <div class="back-row">
      <a href="index.html" class="back-link">← Hoofdpagina</a>
      <a href="programma.html" class="back-link">📅 Programma</a>
    </div>
    <div class="refresh-info">Ververs de pagina voor de laatste stand</div>

  </div>

  <script>
    setTimeout(() => location.reload(), 60000);
  </script>

</body>
</html>
